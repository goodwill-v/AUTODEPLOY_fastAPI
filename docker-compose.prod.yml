# Production: использует образ из GHCR (без сборки)
version: '3.8'

services:
  fastapi-app:
    image: ghcr.io/goodwill-v/autodeploy_fastapi:latest
    container_name: fastapi-app
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
    volumes:
      - /opt/fastapi-app/logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
